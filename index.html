<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To-Do List App</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <div class="todo-app">
            <div class="header">
                <h1>📝 My Tasks</h1>
                <p class="subtitle">Organize your day with ease</p>
            </div>

            <div class="input-section">
                <input 
                    type="text" 
                    id="taskInput" 
                    class="task-input" 
                    placeholder="Add a new task..."
                    autocomplete="off"
                >
                <button id="addBtn" class="add-btn">Add Task</button>
            </div>

            <div class="filter-section">
                <button class="filter-btn active" data-filter="all">All</button>
                <button class="filter-btn" data-filter="active">Active</button>
                <button class="filter-btn" data-filter="completed">Completed</button>
            </div>

            <div class="stats">
                <span id="totalTasks">Total: 0</span>
                <span id="activeTasks">Active: 0</span>
                <span id="completedTasks">Completed: 0</span>
            </div>

            <ul id="taskList" class="task-list"></ul>

            <div class="empty-state" id="emptyState">
                <p>🎯 No tasks yet. Add one to get started!</p>
            </div>

            <div class="action-buttons">
                <button id="clearCompleted" class="clear-btn">Clear Completed</button>
                <button id="clearAll" class="clear-all-btn">Clear All</button>
            </div>

            <div class="footer">
                <p>💾 Your tasks are saved automatically</p>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
